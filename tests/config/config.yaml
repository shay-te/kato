# @package _global_
core_lib:
  app:
    name: openhands-agent-test
  email_core_lib:
    client:
      _target_: email_core_lib.client.send_in_blue_client.SendInBlueClient
      api_key: test-send-in-blue-api-key
      slack_email_error_url: ""

openhands_agent:
  retry:
    max_retries: 5
  failure_email:
    enabled: true
    template_id: "42"
    recipients:
      - ops@example.com
    sender:
      name: OpenHands Agent
      email: noreply@example.com
  youtrack:
    base_url: http://localhost:8080
    token: test-youtrack-token
    project: TEST
    assignee: me
    issue_states:
      - Todo
      - Open
  bitbucket:
    base_url: http://localhost:8081
    token: test-bitbucket-token
    workspace: test-workspace
    repo_slug: test-repo
    destination_branch: main
  openhands:
    base_url: http://localhost:3000
    api_key: test-openhands-api-key
