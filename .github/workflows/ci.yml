name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: sh ./scripts/install-python-deps.sh python editable

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run unit tests with coverage
        run: |
          # Top-level integration tests
          coverage run -m unittest discover -s tests
          # Plus every core-lib's internal tests (per CLAUDE.md core-lib quality rule:
          # "Tests live inside the lib at <lib>/<lib>/tests/"). Without this loop,
          # ~1000+ unit tests living inside the libs never run in CI and coverage
          # is artificially low (~73% instead of ~90%).
          for tests_dir in */*/tests; do
            if [ -d "$tests_dir" ] && ls "$tests_dir"/test_*.py >/dev/null 2>&1; then
              coverage run --append -m unittest discover -s "$tests_dir" -t .
            fi
          done
          coverage report --show-missing

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/bootstrap.sh scripts/install-python-deps.sh scripts/run-local.sh docker/entrypoint-run.sh
